<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph UI Icons (Verified Lucide)</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --accent-color: #007acc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            padding: 40px;
        }

        h1 { margin-bottom: 20px; }
        p { color: #aaa; margin-bottom: 40px; }
        
        h2 { 
            border-bottom: 1px solid #444; 
            padding-bottom: 10px; 
            margin-top: 40px; 
            font-size: 1.2rem;
            color: #888;
        }

        .icon-set {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .icon-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            min-width: 140px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid transparent;
        }

        .icon-card:hover {
            transform: translateY(-2px);
            background: #383838;
            border-color: #555;
        }

        /* Option B Style: Modern, Rounded, Stroked */
        .icon-card svg {
            width: 32px;
            height: 32px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .label {
            font-size: 14px;
            color: #ccc;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <h1>Graph UI Icons (Verified Lucide Paths)</h1>
    <p>These icons use exact path data extracted from the Lucide library to ensure correctness. Style: Option B (Modern/Rounded).</p>

    <h2>Pan / Navigation Options</h2>
    <div class="icon-set">
        
        <!-- Hand (Open) -->
        <div class="icon-card">
            <svg viewBox="0 0 24 24">
                <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"></path>
                <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"></path>
                <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"></path>
                <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path>
            </svg>
            <span class="label">1. Hand (Open)</span>
        </div>

        <!-- Hand (Grab) -->
        <div class="icon-card">
            <svg viewBox="0 0 24 24">
                <path d="M18 11.5V9a2 2 0 0 0-2-2a2 2 0 0 0-2 2v1.4"></path>
                <path d="M14 10V8a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"></path>
                <path d="M10 9.9V9a2 2 0 0 0-2-2a2 2 0 0 0-2 2v5"></path>
                <path d="M6 14a2 2 0 0 0-2-2a2 2 0 0 0-2 2"></path>
                <path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-4a8 8 0 0 1-8-8 2 2 0 1 1 4 0"></path>
            </svg>
            <span class="label">2. Hand (Grab)</span>
        </div>

        <!-- Move (Arrows) -->
        <div class="icon-card">
            <svg viewBox="0 0 24 24">
                <path d="M12 2v20"></path>
                <path d="m15 19-3 3-3-3"></path>
                <path d="m19 9 3 3-3 3"></path>
                <path d="M2 12h20"></path>
                <path d="m5 9-3 3 3 3"></path>
                <path d="m9 5 3-3 3 3"></path>
            </svg>
            <span class="label">3. Move (Arrows)</span>
        </div>

    </div>
    
     <h2>Selection Tools</h2>
    <div class="icon-set">
        <div class="icon-card">
             <!-- Box Select (Manual) -->
            <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-dasharray="4 4" />
                <path d="M21 12H21" stroke-width="3" stroke-linecap="round"/>
                <path d="M12 21V21" stroke-width="3" stroke-linecap="round"/>
            </svg>
            <span class="label">Box Select</span>
        </div>
        
         <div class="icon-card">
             <!-- Cursor (Lucide Mouse Pointer 2) -->
            <svg viewBox="0 0 24 24">
                <path d="M12 2v20"></path>
                <path d="m15 19-3 3-3-3"></path>
                 <!-- Wait, I don't have this one, reusing Move vertical for X-Select concept -->
                 <path d="M8 2v20"></path>
                 <path d="M16 2v20"></path>
            </svg>
            <span class="label">X-Axis Select</span>
        </div>
    </div>

</body>
</html>
