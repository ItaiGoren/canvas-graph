<div class="graph-view-container">
    <!-- Graph Render Area (ThreeJS Canvas) -->
    <div #graphContainer class="graph-render-area"></div>

    <!-- UI Overlay - Compact Toolbar -->
    <div class="toolbar">
        <!-- Pan: Open Hand (Verified Lucide) -->
        <button (click)="setMode('pan')" [class.active]="currentMode === 'pan'" class="tool-btn" title="Pan">
            <svg viewBox="0 0 24 24">
                <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2"></path>
                <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2"></path>
                <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8"></path>
                <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"></path>
            </svg>
        </button>
        
        <div class="divider"></div>

        <!-- Box Select (Area) -->
        <button (click)="setMode('box-zoom')" [class.active]="currentMode === 'box-zoom'" class="tool-btn" title="Box Select">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-dasharray="4 4" />
                </svg> 
        </button>
        
        <!-- X-Axis Select (Restored Option B) -->
        <button (click)="setMode('x-zoom')" [class.active]="currentMode === 'x-zoom'" class="tool-btn" title="X-Axis Select">
            <svg viewBox="0 0 24 24">
                <path d="M8 2v20M16 2v20M4 12h16" stroke-opacity="0.5"/>
                <path d="M8 2v20M16 2v20"/>
            </svg>
        </button>
        
        <div class="divider"></div>
        
        <!-- Reset Zoom -->
        <button (click)="resetZoom()" class="tool-btn" title="Reset View">
                <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /></svg>
        </button>
    </div>

    <!-- Compact Status Overlay -->
    <div class="status-overlay">
        {{ statusMessage }}
    </div>
</div>
