 <div class="app-container">
      <div class="centered-content">
        <div class="data-selector">
          <label *ngFor="let type of dataTypes" class="radio-label">
            <input type="radio" name="dataType" [value]="type" [checked]="currentDataType === type" (change)="regenerateData(type)">
            <span class="radio-custom"></span>
            <span class="radio-text">{{ type }}</span>
          </label>
        </div>
        <div class="graph-area">
          <app-graph-view #graphView></app-graph-view>
        </div>
      </div>
    </div>
